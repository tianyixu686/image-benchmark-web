version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pmg-benchmark-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pmg_benchmark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmg-network

  redis:
    image: redis:7-alpine
    container_name: pmg-benchmark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pmg-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmg-benchmark-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pmg_benchmark
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IMAGE_BASE_PATH=static/images
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmg-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pmg-benchmark-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pmg-network

  nginx:
    image: nginx:alpine
    container_name: pmg-benchmark-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend/dist:/usr/share/nginx/html
      - ./backend/static/images:/usr/share/nginx/html/static/images
    depends_on:
      - backend
      - frontend
    networks:
      - pmg-network

volumes:
  postgres_data:
  redis_data:

networks:
  pmg-network:
    driver: bridge