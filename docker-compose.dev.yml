version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pmg-benchmark-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pmg_benchmark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - pmg-network-dev

  redis:
    image: redis:7-alpine
    container_name: pmg-benchmark-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    networks:
      - pmg-network-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pmg-benchmark-backend-dev
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pmg_benchmark
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IMAGE_BASE_PATH=static/images
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - pmg-network-dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pmg-benchmark-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pmg-network-dev

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  pmg-network-dev:
    driver: bridge